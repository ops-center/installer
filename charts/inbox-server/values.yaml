  replicaJmapInstanceCount: 1
  replicaImapSmtpInstanceCount: 1
  image: ghcr.io/appscode/inbox-server:latest
  ## Environment for James
  env:
    jamesCassandraKeyspace: sandbox_james
    jamesCassandraCacheKeyspace: sandbox_james_cache
    jamesEsMailboxIndex: "mailbox_v1"
    jamesEsClusterName: "change-me"
    jamesEsHostScheme: "http"
    jamesEsSslValidationStrategy: "default"
    jamesEsHostNameVerifier: "default"
    jamesEsNbShards: 5
    jamesEsNbReplica: 1
    jamesEsMailboxReadAlias: "read-mailbox"
    jamesEsMailboxWriteAlias: "write-mailbox"
    jamesRabbitHost: "change-me"
    jamesMessageSize: 25M
    jamesDkimSignSmtp: "dkimselector"
    jamesDkimSignDomain: "mail.example.com"
    cassandraReplicationFactor: 3
    jamesHELOMessage: "change-me"
    jvmOpts: "-Xms3g -Xmx3g"
    glowroot:
      enabled: false
    jamesResources:
      limits:
        cpu: "2000m"
        memory: "4Gi"
      requests:
        cpu: "1000m"
        memory: "4Gi"
  tls:
    # secretName: the-name-of-a-secret
    secretName: ""

# Requires Prometheus Operator to be installed
serviceMonitor:
  enabled: false
  # Labels for Prometheus Operator to detect ServiceMonitor. Cannot be empty 
  additionalLabels:
    change-me: change-me
  # Scrape interval. Use Prometheus default value if not specified
  interval: 30s

ingress:
  enabled: false
  className: ""
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"
    # cert-manager.io/cluster-issuer: name-of-the-cluster-issuer
  tls:
    secretName: the-name-of-a-secret

adminIngress:
  enabled: false
  className: ""
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"
    # cert-manager.io/cluster-issuer: name-of-the-cluster-issuer
  tls:
      secretName: the-name-of-a-secret

###
# Please refer to the values.yaml from the Helm package for databases
# for a better explaination of the Cassandra parameters.
###
cassandra:
  secret:
    username: change-me
    password: change-me
  opensearch1:
    secret:
      username: admin
      password: admin
  image:
    repository: cassandra
    pullPolicy: IfNotPresent
    # Overrides the image tag whose default is the chart appVersion.
    tag: 4.1.3
  livenessProbe:
    exec:
      command:
        - cqlsh
        - -e
        - describe keyspaces
    failureThreshold: 5
    periodSeconds: 3
    timeoutSeconds: 20
  # readinessProbe
  # resources
  # podSecurityContext ?
  # securityContext ?
  # volumes
  # volumeMounts

###
# Please refer to the values.yaml from the Helm package for databases
# for a better explaination of the Elastic Search parameters.
###
opensearch:
  secret:
    username: admin
    password: admin
  enabled: true
  image:
    repository: opensearchproject/opensearch
    pullPolicy: IfNotPresent
    # Overrides the image tag whose default is the chart appVersion.
    tag: 2.1.0
  # livenessProbe
  # readinessProbe
  # resources
  # podSecurityContext ?
  # securityContext ?
  # volumes
  # volumeMounts

rabbitmq:
  secret:
    username: guest
    password: guest
  image:
    repository: rabbitmq
    pullPolicy: IfNotPresent
    # Overrides the image tag whose default is the chart appVersion.
    tag: 3.12.1-management
  # livenessProbe
  # readinessProbe
  # resources
  # podSecurityContext ?
  # securityContext ?
  # volumes
  # volumeMounts

s3:
  endpoint: "http://s3-us-east-1.amazonaws.com"
  region: "US"
  accessKeyId: "change-me"
  secretKey: "change-me"
  bucketNameSuffix: "change-me"
  enabled: true
  image:
    repository: ghcr.io/appscode/cloudserver
    pullPolicy: IfNotPresent
    # Overrides the image tag whose default is the chart appVersion.
    tag: 8.8.20
  # livenessProbe
  # readinessProbe
  # resources
  # podSecurityContext ?
  # securityContext ?
  # volumes
  # volumeMounts

tika:
  enabled: true
  image:
    repository: apache/tika
    pullPolicy: IfNotPresent
    # Overrides the image tag whose default is the chart appVersion.
    tag: 2.8.0.0
  # livenessProbe
  # readinessProbe
  # resources
  # podSecurityContext ?
  # securityContext ?
  # volumes
  # volumeMounts

#-------------------

replicaCount: 1

# imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

podAnnotations: {}
podLabels: {}

podSecurityContext: {}
# podSecurityContext: # +doc-gen:break
#   fsGroup: 65534

securityContext: {}
# securityContext: # +doc-gen:break
#   allowPrivilegeEscalation: false
#   capabilities:
#     drop: ["ALL"]
#   readOnlyRootFilesystem: true
#   runAsNonRoot: true
#   runAsUser: 65534
#   seccompProfile:
#     type: RuntimeDefault

service:
  type: ClusterIP
  # port: 80

resources: {}
  # We usually recommend not to specify default resources and to leave this as a conscious
  # choice for the user. This also increases chances charts run on environments with little
  # resources, such as Minikube. If you do want to specify resources, uncomment the following
  # lines, adjust them as necessary, and remove the curly braces after 'resources:'.
  # limits:
  #   cpu: 100m
  #   memory: 128Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi

livenessProbe:
  httpGet:
    path: /
    port: http
readinessProbe:
  httpGet:
    path: /
    port: http

# Additional volumes on the output Deployment definition.
volumes: []
# - name: foo
#   secret:
#     secretName: mysecret
#     optional: false

# Additional volumeMounts on the output Deployment definition.
volumeMounts: []
# - name: foo
#   mountPath: "/etc/foo"
#   readOnly: true

nodeSelector: {}

tolerations: []

affinity: {}
