            IfPossible or to Enabled, MountPropagation must be None or unspecified
            (which defaults to None).
          type: string
        name:
          description: This must match the Name of a Volume.
          type: string
        readOnly:
          description: Mounted read-only if true, read-write otherwise (false or unspecified).
            Defaults to false.
          type: boolean
        recursiveReadOnly:
          description: "RecursiveReadOnly specifies whether read-only mounts should\
            \ be handled recursively. \n If ReadOnly is false, this field has no meaning\
            \ and must be unspecified. \n If ReadOnly is true, and this field is set\
            \ to Disabled, the mount is not made recursively read-only.  If this field\
            \ is set to IfPossible, the mount is made recursively read-only, if it\
            \ is supported by the container runtime.  If this field is set to Enabled,\
            \ the mount is made recursively read-only if it is supported by the container\
            \ runtime, otherwise the pod will not be started and an error will be\
            \ generated to indicate the reason. \n If this field is set to IfPossible\
            \ or Enabled, MountPropagation must be set to None (or be unspecified,\
            \ which defaults to None). \n If this field is not specified, it is treated\
            \ as an equivalent of Disabled."
          type: string
        subPath:
          description: Path within the volume from which the container's volume should
            be mounted. Defaults to "" (volume's root).
          type: string
        subPathExpr:
          description: Expanded path within the volume from which the container's
            volume should be mounted. Behaves similarly to SubPath but environment
            variable references $(VAR_NAME) are expanded using the container's environment.
            Defaults to "" (volume's root). SubPathExpr and SubPath are mutually exclusive.
          type: string
      required:
      - mountPath
      - name
      type: object
    type: array
required:
- imagePullPolicy
- inboxServer
- monitoring
- operator
- rbacproxy
- registryFQDN
- replicaCount
- serviceAccount
- volumeMounts
type: object
